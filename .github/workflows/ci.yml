name: 継続的インテグレーション

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  lint:
    name: 静的検査
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - &checkout
        uses: actions/checkout@v6

      - &setup-pnpm
        uses: pnpm/action-setup@v6

      - &setup-node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - &install-deps
        name: 依存関係をインストール
        run: pnpm install --frozen-lockfile

      - name: フォーマットを確認
        run: pnpm run format:check

      - name: 静的検査を実行
        run: pnpm run lint

  build:
    name: ビルド
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - *checkout
      - *setup-pnpm
      - *setup-node
      - *install-deps

      - name: ビルド
        run: pnpm run build:ci

  e2e:
    name: E2E テスト
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - *checkout
      - *setup-pnpm
      - *setup-node
      - *install-deps

      - name: 日本語フォントをインストール
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Playwright Chromium をインストール
        run: pnpm exec playwright install --with-deps chromium

      - name: Playwright E2E テストを実行
        run: pnpm run test:e2e

      - name: Playwright レポートをアップロード
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Playwright テスト結果をアップロード
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7
